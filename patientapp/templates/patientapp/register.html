{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>KiddoVax | Create Patient Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script>
      tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#006565", "secondary": "#0c6780", "background": "#f8fafc", "on-surface": "#002020", "modern-cyan": "#06b6d4", "modern-blue": "#3b82f6" }, fontFamily: { "headline": ["Manrope", "sans-serif"], "body": ["Inter", "sans-serif"] }, } } }
    </script>
    <style>
      body { -webkit-font-smoothing: antialiased; background-color: #f8fafc; }
      .mesh-bg { background-image: radial-gradient(at 100% 0%, rgba(0, 101, 101, 0.1) 0px, transparent 50%), radial-gradient(at 0% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%); }
      .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="text-on-surface font-body mesh-bg min-h-screen flex items-center justify-center p-6 py-12">

    <div class="glass-card rounded-3xl w-full max-w-2xl p-10 shadow-[0_20px_60px_rgba(0,0,0,0.05)] relative overflow-hidden animate__animated animate__fadeInUp">
        
        <!-- Decorative Glow -->
        <div class="absolute -top-10 -right-10 w-48 h-48 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>

        <!-- Header -->
        <div class="flex flex-col items-center mb-10">
            <div class="w-16 h-16 mb-4 rounded-xl bg-gradient-to-br from-primary to-modern-cyan shadow-[0_8px_20px_rgba(6,182,212,0.3)] flex items-center justify-center border border-white/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="text-white w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
            </div>
            <h1 class="font-headline font-black text-3xl text-gray-800 tracking-tight text-center">Patient Registration</h1>
            <p class="text-gray-500 font-medium mt-2 text-center text-sm">Join the community for a healthier tomorrow</p>
        </div>

        {% if messages %}
            <div class="space-y-3 mb-8">
                {% for message in messages %}
                <div class="bg-blue-50 border-l-4 border-primary text-primary p-3 rounded-r-xl shadow-sm animate__animated animate__fadeInDown text-sm font-bold" role="alert">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            {% csrf_token %}
            
            <!-- Parent Name -->
            <div class="space-y-1 md:col-span-2">
                <label for="id_name" class="block text-xs font-bold text-gray-500 uppercase tracking-widest px-1">Father / Parent Name</label>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    <input type="text" name="name" id="id_name" required 
                           class="w-full bg-slate-50 border border-gray-200 rounded-xl pl-12 pr-4 py-3 text-gray-800 font-bold focus:ring-2 focus:ring-modern-cyan/50 focus:border-modern-cyan transition-all"
                           placeholder="Enter full name">
                </div>
            </div>

            <!-- Address -->
            <div class="space-y-1 md:col-span-2">
                <label for="id_address" class="block text-xs font-bold text-gray-500 uppercase tracking-widest px-1">Residential Address</label>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-4 text-gray-400 w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <textarea name="address" id="id_address" rows="2" required 
                              class="w-full bg-slate-50 border border-gray-200 rounded-xl pl-12 pr-4 py-3 text-gray-800 font-medium focus:ring-2 focus:ring-modern-cyan/50 focus:border-modern-cyan transition-all"
                              placeholder="Complete address..."></textarea>
                </div>
            </div>

            <!-- City Dropdown -->
            <div class="space-y-1">
                <label for="cityId" class="block text-xs font-bold text-gray-500 uppercase tracking-widest px-1">Select City</label>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                    </svg>
                    <select id="cityId" name="cityId" required 
                            class="w-full bg-slate-50 border border-gray-200 rounded-xl pl-12 pr-4 py-3 text-gray-800 font-bold focus:ring-2 focus:ring-modern-cyan/50 focus:border-modern-cyan transition-all appearance-none cursor-pointer">
                        <option value="">-- City --</option>
                        {% for item in cityData %}
                        <option value="{{item.id}}">{{item.cityName}}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Area Dropdown (Dynamic) -->
            <div class="space-y-1">
                <label for="areaId" class="block text-xs font-bold text-gray-500 uppercase tracking-widest px-1">Select Area</label>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                    </svg>
                    <select id="areaId" name="areaId" required 
                            class="w-full bg-slate-50 border border-gray-200 rounded-xl pl-12 pr-4 py-3 text-gray-800 font-bold focus:ring-2 focus:ring-modern-cyan/50 focus:border-modern-cyan transition-all appearance-none cursor-pointer">
                        <option value="">-- Area --</option>
                    </select>
                </div>
            </div>

            <!-- Contact Number -->
            <div class="space-y-1">
                <label for="id_contactNo" class="block text-xs font-bold text-gray-500 uppercase tracking-widest px-1">Contact Number</label>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                    </svg>
                    <input type="text" name="contactNo" id="id_contactNo" maxlength="10" required 
                           class="w-full bg-slate-50 border border-gray-200 rounded-xl pl-12 pr-4 py-3 text-gray-800 font-bold focus:ring-2 focus:ring-modern-cyan/50 focus:border-modern-cyan transition-all"
                           onkeypress="return restrictAlphabets(event)" placeholder="10 digits">
                </div>
            </div>

            <!-- Password -->
            <div class="space-y-1">
                <label for="id_password" class="block text-xs font-bold text-gray-500 uppercase tracking-widest px-1">Create Password</label>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                    <input type="password" name="password" id="id_password" required 
                           class="w-full bg-slate-50 border border-gray-200 rounded-xl pl-12 pr-4 py-3 text-gray-800 font-mono tracking-widest focus:ring-2 focus:ring-modern-cyan/50 focus:border-modern-cyan transition-all"
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="btnsubmit" class="md:col-span-2 w-full mt-4 bg-gradient-to-r from-primary to-modern-cyan text-white font-headline font-bold py-4 px-6 rounded-xl shadow-[0_8px_20px_rgba(6,182,212,0.3)] hover:shadow-[0_8px_25px_rgba(6,182,212,0.5)] transform hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg> Create My Account
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100/50 flex flex-col items-center gap-4">
            <p class="text-sm text-gray-400 font-medium">Already have an account?</p>
            <a href="{% url 'patient:loginpage' %}" class="w-full text-center px-6 py-3 rounded-xl border-2 border-primary/20 text-primary font-headline font-bold hover:bg-primary/5 transition-all duration-300">
                Login Here
            </a>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function restrictAlphabets(evt) {
            var x = (evt.which) ? evt.which : evt.keyCode;
            if (x >= 48 && x <= 57 || x == 8) return true;
            return false;
        }

        $(document).ready(function() {
            // City -> Area AJAX Cascading
            $("#cityId").change(function () {
                var cityid = $(this).val();  
                $("#areaId").empty().append('<option value="">Loading...</option>');
                $.ajax({                       
                    url: "{% url 'adminapp:load_areas' %}",       
                    data: { 'city_id': cityid },
                    success: function (data) {   
                        $("#areaId").html(data);  
                    }
                });  
            });

            // Contact validation
            $('#id_contactNo').on('input change blur', function() {
                if($(this).val().length === 10) {
                    $('#btnsubmit').prop('disabled', false).removeClass('opacity-50 cursor-not-allowed');
                } else {
                    $('#btnsubmit').prop('disabled', true).addClass('opacity-50 cursor-not-allowed');
                }
            });
            $('#id_contactNo').trigger('change');
        });
    </script>
</body>
</html>
