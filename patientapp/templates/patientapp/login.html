{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>KiddoVax | Patient Portal Access</title>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script>
      tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#006565", "secondary": "#0c6780", "background": "#f8fafc", "on-surface": "#002020", "modern-cyan": "#06b6d4", "modern-blue": "#3b82f6" }, fontFamily: { "headline": ["Manrope", "sans-serif"], "body": ["Inter", "sans-serif"] }, } } }
    </script>
    <style>
      body { -webkit-font-smoothing: antialiased; background-color: #f8fafc; overflow: hidden; }
      .mesh-bg { background-image: radial-gradient(at 100% 0%, rgba(0, 101, 101, 0.1) 0px, transparent 50%), radial-gradient(at 0% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%); }
      .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="text-on-surface font-body mesh-bg min-h-screen flex items-center justify-center p-6">

    <div class="glass-card rounded-3xl w-full max-w-md p-10 shadow-[0_20px_60px_rgba(0,0,0,0.05)] relative overflow-hidden animate__animated animate__fadeInUp">
        
        <!-- Decorative Glow -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/20 rounded-full blur-3xl pointer-events-none"></div>

        <!-- Header -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-20 h-20 mb-6 rounded-2xl bg-gradient-to-br from-primary to-modern-cyan shadow-[0_8px_20px_rgba(6,182,212,0.3)] flex items-center justify-center border border-white/20">
                <!-- SVG Person Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="text-white w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <h1 class="font-headline font-black text-3xl text-gray-800 tracking-tight text-center">Patient Login</h1>
            <p class="text-gray-500 font-medium mt-2 text-center text-sm">Welcome back to the KiddoVax Portal</p>
        </div>

        {% if messages %}
            <div class="space-y-3 mb-6">
                {% for message in messages %}
                <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 rounded-r-xl shadow-sm animate__animated animate__headShake text-sm font-bold" role="alert">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div class="space-y-1">
                <label for="contactno" class="block text-xs font-bold text-gray-500 uppercase tracking-widest px-1">Contact Number</label>
                <div class="relative">
                    <!-- SVG Phone Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                    </svg>
                    <input type="text" id="contactno" name="contactno" maxlength="10" required 
                           class="w-full bg-slate-50 border border-gray-200 rounded-xl pl-12 pr-4 py-3 text-gray-800 font-bold focus:ring-2 focus:ring-modern-cyan/50 focus:border-modern-cyan transition-all"
                           onkeypress="return restrictAlphabets(event)" placeholder="Enter 10-digit number">
                </div>
            </div>

            <div class="space-y-1">
                <label for="password" class="block text-xs font-bold text-gray-500 uppercase tracking-widest px-1">Password</label>
                <div class="relative">
                    <!-- SVG Lock Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                    <input type="password" id="password" name="password" required 
                           class="w-full bg-slate-50 border border-gray-200 rounded-xl pl-12 pr-4 py-3 text-gray-800 font-mono tracking-widest focus:ring-2 focus:ring-modern-cyan/50 focus:border-modern-cyan transition-all"
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="btnsubmit" class="w-full bg-gradient-to-r from-primary to-modern-cyan text-white font-headline font-bold py-3.5 px-6 rounded-xl shadow-[0_8px_20px_rgba(6,182,212,0.3)] hover:shadow-[0_8px_25px_rgba(6,182,212,0.5)] transform hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg> Log In
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100/50 flex flex-col items-center gap-4">
            <p class="text-sm text-gray-400 font-medium">Don't have an account yet?</p>
            <a href="{% url 'patient:registerpage' %}" class="w-full text-center px-6 py-3 rounded-xl border-2 border-primary/20 text-primary font-headline font-bold hover:bg-primary/5 transition-all duration-300">
                Register New Account
            </a>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function restrictAlphabets(evt) {
            var x = (evt.which) ? evt.which : evt.keyCode;
            if (x >= 48 && x <= 57 || x == 8) return true;
            return false;
        }

        $(document).ready(function() {
            $('#contactno').on('input change blur', function() {
                if($(this).val().length === 10) {
                    $('#btnsubmit').prop('disabled', false).removeClass('opacity-50 cursor-not-allowed');
                } else {
                    $('#btnsubmit').prop('disabled', true).addClass('opacity-50 cursor-not-allowed');
                }
            });
            $('#contactno').trigger('change');
        });
    </script>
</body>
</html>
