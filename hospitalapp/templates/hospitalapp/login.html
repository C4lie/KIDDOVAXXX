{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>KiddoVax | Hospital SecurID</title>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script>
      tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#006565", "secondary": "#0c6780", "background": "#f8fafc", "on-surface": "#002020", "modern-cyan": "#06b6d4", "modern-blue": "#3b82f6" }, fontFamily: { "headline": ["Manrope", "sans-serif"], "body": ["Inter", "sans-serif"] }, } } }
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      body { -webkit-font-smoothing: antialiased; background-color: #f8fafc; overflow: hidden; }
      .mesh-bg { background-image: radial-gradient(at 100% 0%, rgba(0, 101, 101, 0.1) 0px, transparent 50%), radial-gradient(at 0% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%); }
      .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="text-on-surface font-body mesh-bg min-h-screen flex items-center justify-center p-6">

    <div class="glass-card rounded-3xl w-full max-w-md p-10 shadow-[0_20px_60px_rgba(0,0,0,0.05)] relative overflow-hidden animate__animated animate__fadeInUp">
        
        <!-- Decorative Glow -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/20 rounded-full blur-3xl pointer-events-none"></div>

        <!-- Header -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-24 h-24 mb-6 rounded-2xl bg-gradient-to-br from-primary to-modern-cyan shadow-[0_8px_20px_rgba(6,182,212,0.3)] flex items-center justify-center border border-white/20 transform rotate-3 hover:rotate-0 transition-transform duration-500">
                <span class="material-symbols-outlined text-white text-5xl">domain</span>
            </div>
            <h1 class="font-headline font-black text-3xl text-gray-800 tracking-tight text-center">Hospital Portal</h1>
            <p class="text-gray-500 font-medium mt-2 text-center text-sm">Sign in to manage vaccines & appointments</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 rounded-r-xl shadow-sm mb-6 animate__animated animate__headShake text-sm font-bold" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Form -->
        <form method="POST" action="{% url 'hospitalapp:hospitallogin' %}" class="space-y-5">
            {% csrf_token %}
            
            <div class="space-y-1">
                <label for="contact" class="block text-xs font-bold text-gray-500 uppercase tracking-widest px-1">Hospital Contact No.</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400">call</span>
                    <input type="text" id="contact" name="contact" maxlength="10" required 
                           class="w-full bg-slate-50 border border-gray-200 rounded-xl pl-12 pr-4 py-3 text-gray-800 font-bold focus:ring-2 focus:ring-modern-cyan/50 focus:border-modern-cyan transition-all"
                           onkeypress="return isNumberKey(event)" placeholder="Enter 10-digit number">
                </div>
            </div>

            <div class="space-y-1">
                <label for="password" class="block text-xs font-bold text-gray-500 uppercase tracking-widest px-1">Access Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400">lock</span>
                    <input type="password" id="password" name="password" required 
                           class="w-full bg-slate-50 border border-gray-200 rounded-xl pl-12 pr-4 py-3 text-gray-800 font-mono tracking-widest focus:ring-2 focus:ring-modern-cyan/50 focus:border-modern-cyan transition-all"
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="btnsubmit" class="w-full mt-8 bg-gradient-to-r from-primary to-modern-cyan text-white font-headline font-bold py-3.5 px-6 rounded-xl shadow-[0_8px_20px_rgba(6,182,212,0.3)] hover:shadow-[0_8px_25px_rgba(6,182,212,0.5)] transform hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-[20px]">login</span> Authenticate
            </button>
        </form>

    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Restrict to numbers only
        function isNumberKey(evt) {
            var charCode = (evt.which) ? evt.which : evt.keyCode;
            if (charCode > 31 && (charCode < 48 || charCode > 57)) return false;
            return true;
        }
        
        // Ensure exactly 10 digits
        $(document).ready(function() {
            $('#contact').on('input change blur', function() {
                if($(this).val() !== '' && $(this).val().length === 10) {
                    $('#btnsubmit').prop('disabled', false).removeClass('opacity-50 cursor-not-allowed');
                } else {
                    $('#btnsubmit').prop('disabled', true).addClass('opacity-50 cursor-not-allowed');
                }
            });
            // trigger on load
            $('#contact').trigger('change');
        });
    </script>
</body>
</html>
