{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>KiddoVax | Receptionist Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- We inject Tailwind CSS directly -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "admin-primary": "#4f46e5",    /* Indigo 600 */
              "admin-secondary": "#4338ca",  /* Indigo 700 */
              "background": "#f8fafc",
              "on-surface": "#0f172a",       /* Slate 900 */
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Inter", "sans-serif"]
            },
          }
        }
      }
    </script>

    <style>
      body { -webkit-font-smoothing: antialiased; background-color: #f8fafc; overflow: hidden; }
      
      /* Glassmorphism Classes */
      .glass-card {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 25px 50px -12px rgba(79, 70, 229, 0.15), 0 0 20px rgba(255, 255, 255, 0.4) inset;
      }
      
      /* Subtle Admin Indigo Mesh Background */
      .mesh-bg {
        background-color: #f8fafc;
        background-image: 
          radial-gradient(at 10% 20%, rgba(79, 70, 229, 0.1) 0px, transparent 50%),
          radial-gradient(at 90% 80%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
          radial-gradient(at 50% 50%, rgba(255, 255, 255, 0.9) 0px, transparent 100%);
      }

      /* Premium Input Styling */
      .glass-input {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(203, 213, 225, 0.6);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .glass-input:focus {
        background: #ffffff;
        border-color: #4f46e5;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      }
    </style>
</head>
<body class="text-on-surface font-body mesh-bg min-h-screen flex items-center justify-center relative">

    <!-- Subtle Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute w-[800px] h-[800px] bg-indigo-200/20 rounded-full blur-[100px] -top-[400px] -left-[200px] animate-pulse" style="animation-duration: 10s;"></div>
        <div class="absolute w-[600px] h-[600px] bg-blue-200/20 rounded-full blur-[80px] bottom-[10%] -right-[100px] animate-pulse" style="animation-duration: 12s; animation-delay: 2s;"></div>
    </div>

    <!-- Main Login Card -->
    <div class="w-full max-w-lg p-6 animate__animated animate__fadeInUp">
        
        <!-- Logo / Header -->
        <div class="flex items-center justify-center gap-3 mb-8 animate__animated animate__fadeInDown">
            <div class="flex items-center font-headline font-black text-5xl tracking-tighter text-[#006a6a]">
                Kidd<img src="{% static 'patients/images/logo-icon.png' %}" alt="o" class="h-12 mx-1 object-contain drop-shadow-sm transition-transform hover:scale-105 duration-300">Vax
            </div>
            <div class="flex flex-col justify-center border-l-2 border-indigo-100 pl-3 h-10">
                <p class="text-indigo-600 font-black text-[13px] tracking-widest uppercase mt-0.5">Receptionist</p>
                <p class="text-slate-400 font-bold text-[10px] tracking-widest uppercase">Portal</p>
            </div>
        </div>

        <!-- Form Card -->
        <div class="glass-card rounded-[2rem] p-10 relative overflow-hidden">
            <!-- Decorative corner accent -->
            <div class="absolute -top-12 -right-12 w-32 h-32 bg-gradient-to-br from-indigo-400 to-indigo-600 rounded-full blur-2xl opacity-20"></div>

            <form method="post" action="{% url 'receptionist:receptionistlogin' %}" autocomplete="off" class="space-y-6 relative z-10">
                {% csrf_token %}

                {% if messages %}
                <div class="bg-red-50 text-red-600 border border-red-100 rounded-2xl p-4 text-sm font-bold flex items-center gap-3 animate__animated animate__headShake shadow-sm">
                    <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                    </svg>
                    <ul class="list-none p-0 m-0">
                        {% for message in messages %}
                        <li>{{ message }}</li>
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}

                <!-- Username / Contact No -->
                <div class="space-y-2 group">
                    <label for="contact" class="block text-sm font-bold text-slate-700 ml-1">Registered Phone Number</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-admin-primary transition-colors">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="text" pattern="\d{10}" id="contact" name="contact" class="glass-input block w-full pl-11 pr-4 py-4 rounded-2xl text-slate-800 placeholder-slate-400 focus:outline-none font-medium text-lg leading-tight" placeholder="10-digit number" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2 group">
                    <div class="flex justify-between items-center px-1">
                        <label for="password" class="block text-sm font-bold text-slate-700">Access Password</label>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-admin-primary transition-colors">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="password" name="password" class="glass-input block w-full pl-11 pr-4 py-4 rounded-2xl text-slate-800 placeholder-slate-400 focus:outline-none font-medium text-lg leading-tight" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full flex justify-center items-center py-4 px-6 border border-transparent rounded-2xl shadow-[0_10px_20px_-10px_rgba(79,70,229,0.5)] text-lg font-bold text-white bg-gradient-to-r from-admin-primary to-admin-secondary hover:translate-y-[-2px] hover:shadow-[0_15px_30px_-10px_rgba(79,70,229,0.6)] focus:outline-none focus:ring-4 focus:ring-indigo-100 transition-all duration-300 group">
                        Enter Receptionist Hub
                        <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-8 text-center">
            <p class="text-sm font-semibold text-slate-400 tracking-wide">
                &copy; <script>document.write(new Date().getFullYear())</script> KiddoVax System
            </p>
        </div>
    </div>
</body>
</html>
